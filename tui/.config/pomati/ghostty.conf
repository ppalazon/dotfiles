# ghostty --config-file=~/.config/pomati/ghostty -e pomati

# Font configuration
font-size = 70
# Note: Ghostty font sizes work differently than Alacritty
# You may need to adjust this value (try 16-24 for normal sizes)

# Window settings
background-opacity = 0.1
window-padding-x = 2
window-padding-y = 2

# Color scheme - Tomorrow Night theme equivalent
# Foreground and background
foreground = b5b3aa
background = 000000

# Environment
term = xterm-ghostty
