# kitty --config ~/.config/pomati/kitty.conf -e pomati

# Font configuration
font_size 28.0

# Window settings
background_opacity 0.3
window_padding_width 2

# Color scheme - Tomorrow Night theme equivalent
# foreground #b5b3aa
# background #000000
background #1d1f21
foreground #c5c8c6

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Terminal identification
term xterm-kitty
