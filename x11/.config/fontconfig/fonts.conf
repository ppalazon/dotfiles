<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
 <!-- Apply text rasterization, hinting, and anti-aliasing -->
  <match target="font">
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="hinting" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>
    <edit name="lcdfilter" mode="assign">
      <const>lcddefault</const>
    </edit>
  </match>
  <!-- Configure default fonts & fallback fonts -->
  <!-- Replace fonts with preferred fonts -->
  <!-- Noto Emoji allows for emojis to render in all apps including the terminal, remove if not needed  -->
  <alias>
    <family>system-ui</family>
    <prefer>
     <family>Noto Sans</family>
     <family>Noto Color Emoji</family>
     <family>Noto Emoji</family>
     <family>Noto Sans Symbols</family>
     <family>Noto Sans Symbols 2</family>
     <family>STIX MathJax Symbols</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
     <family>Noto Serif</family>
     <family>Noto Color Emoji</family>
     <family>Noto Emoji</family>
     <family>Noto Sans Symbols</family>
     <family>Noto Sans Symbols 2</family>
     <family>STIX MathJax Symbols</family>
    </prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer>
     <family>Noto Sans</family>
     <family>Noto Color Emoji</family>
     <family>Noto Emoji</family>
     <family>Noto Sans Symbols</family>
     <family>Noto Sans Symbols 2</family>
     <family>STIX MathJax Symbols</family>
    </prefer>
  </alias>
  <alias>
    <family>sans</family>
    <prefer>
     <family>Noto Sans</family>
     <family>Noto Color Emoji</family>
     <family>Noto Emoji</family>
     <family>Noto Sans Symbols</family>
     <family>Noto Sans Symbols 2</family>
     <family>STIX MathJax Symbols</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
     <family>JetBrainsMono Nerd Font</family>
     <family>Noto Mono</family>
     <family>Noto Color Emoji</family>
     <family>Noto Emoji</family>
     <family>Noto Sans Symbols</family>
     <family>Noto Sans Symbols 2</family>
     <family>STIX MathJax Symbols</family>
    </prefer>
  </alias>
  <alias>
    <family>ui-monospace</family>
    <prefer>
     <family>JetBrainsMono Nerd Font</family>
     <family>Noto Mono</family>
     <family>Noto Color Emoji</family>
     <family>Noto Emoji</family>
     <family>Noto Sans Symbols</family>
     <family>Noto Sans Symbols 2</family>
     <family>STIX MathJax Symbols</family>
    </prefer>
  </alias>
  <alias>
    <family>mono</family>
    <prefer>
     <family>JetBrainsMono Nerd Font</family>
     <family>Noto Mono</family>
     <family>Noto Color Emoji</family>
     <family>Noto Emoji</family>
     <family>Noto Sans Symbols</family>
     <family>Noto Sans Symbols 2</family>
     <family>STIX MathJax Symbols</family>
    </prefer>
  </alias>
  <alias>
    <family>Charter</family>
    <prefer>
     <family>Noto Serif</family>
     <family>Noto Color Emoji</family>
     <family>Noto Emoji</family>
     <family>Noto Sans Symbols</family>
     <family>Noto Sans Symbols 2</family>
     <family>STIX MathJax Symbols</family>
    </prefer>
  </alias>
  <alias>
    <family>casual</family>
    <prefer>
     <family>Caveat</family>
     <family>Noto Color Emoji</family>
     <family>Noto Emoji</family>
     <family>Noto Sans Symbols</family>
     <family>Noto Sans Symbols 2</family>
     <family>STIX MathJax Symbols</family>
    </prefer>
  </alias>
  <alias>
    <family>ui-rounded</family>
    <prefer>
     <family>Dosis</family>
     <family>Noto Color Emoji</family>
     <family>Noto Emoji</family>
     <family>Noto Sans Symbols</family>
     <family>Noto Sans Symbols 2</family>
     <family>STIX MathJax Symbols</family>
    </prefer>
  </alias>
  <alias>
    <family>Optima</family>
    <prefer>
     <family>EB Garamond</family>
     <family>Noto Color Emoji</family>
     <family>Noto Emoji</family>
     <family>Noto Sans Symbols</family>
     <family>Noto Sans Symbols 2</family>
     <family>STIX MathJax Symbols</family>
    </prefer>
  </alias>
</fontconfig>
